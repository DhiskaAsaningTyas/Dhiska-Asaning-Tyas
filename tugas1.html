<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Tugas 1</title>
    <style>
        /* --- CSS STYLING --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .header-area {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 3rem;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.2);
            letter-spacing: 2px;
        }

        p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* --- CONTAINER MENU --- */
        .menu-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 900px;
            padding: 20px;
        }

        /* --- DESAIN TOMBOL PILIHAN --- */
        .choice-card {
            background: white;
            color: #333;
            width: 260px;
            padding: 50px 20px;
            border-radius: 25px;
            text-align: center;
            text-decoration: none;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 3px solid transparent;
        }

        .choice-card:hover {
            transform: translateY(-15px);
            border-color: #4facfe;
            background: #f0faff;
            box-shadow: 0 20px 40px rgba(0,0,0,0.25);
        }

        /* Ikon sederhana menggunakan CSS */
        .icon {
            font-size: 40px;
            margin-bottom: 15px;
        }

        .choice-card h2 {
            font-size: 1.4rem;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .choice-card span {
            font-size: 0.85rem;
            color: #7f8c8d;
        }

        /* TOMBOL KEMBALI KE HOME UTAMA */
        .back-btn {
            margin-top: 50px;
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            border: 1px solid white;
            padding: 8px 20px;
            border-radius: 50px;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: white;
            color: #4facfe;
        }

        /* Responsif HP */
        @media (max-width: 600px) {
            .choice-card { width: 100%; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="header-area">
        <h1>TUGAS 1</h1>
        <p>Silakan pilih menu yang ingin Anda buka:</p>
    </div>

    <div class="menu-container">
        <a href="biodata.html" class="choice-card">
            <div class="icon">👤</div>
            <h2>BIODATA</h2>
            <span>Lihat Profil Lengkap</span>
        </a>

        <a href="galeri.html" class="choice-card">
            <div class="icon">🖼️</div>
            <h2>GALERI</h2>
            <span>Lihat Koleksi Foto</span>
        </a>

        <a href="video.html" class="choice-card">
            <div class="icon">🎥</div>
            <h2>VIDEO</h2>
            <span>Lihat Konten Video</span>
        </a>
    </div>

    <a href="index.html" class="back-btn">← Kembali ke Halaman Utama</a>

</body>
</html>
