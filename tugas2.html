<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas 02 - Formulir Keuangan</title>
    <style>
        :root {
            --primary: #4facfe;
            --secondary: #00f2fe;
            --dark: #2c3e50;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* Navigasi */
        nav { background: rgba(0,0,0,0.7); width: 100%; padding: 15px; position: fixed; top: 0; text-align: center; z-index: 100; }
        nav a { color: white; text-decoration: none; margin: 0 15px; font-weight: bold; }

        .container {
            background: white;
            width: 100%;
            max-width: 600px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            margin-top: 60px;
        }

        h2 { color: var(--dark); margin-bottom: 20px; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; }

        .form-step { display: none; animation: fadeIn 0.5s ease; }
        .form-step.active { display: block; }

        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #555; font-size: 14px; }
        
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 8px rgba(79, 172, 254, 0.2); }

        /* Radio Buttons as Buttons for Jenis Transaksi */
        .transaction-type { display: flex; gap: 10px; margin-top: 5px; }
        .transaction-type input { display: none; }
        .transaction-type label {
            flex: 1;
            padding: 10px;
            background: #f4f4f4;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid #ddd;
        }
        .transaction-type input:checked + label {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .btn-group { display: flex; justify-content: space-between; margin-top: 25px; }
        button {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-next { background: var(--primary); color: white; }
        .btn-prev { background: #ccc; color: #333; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }

        @keyframes fadeIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

<nav>
    <a href="index.html">Home</a>
    <a href="tugas1/biodata.html">Tugas 1</a>
    <a href="tugas2.html">Tugas 2</a>
</nav>

<div class="container">
    <form id="multiStepForm">
        
        <div class="form-step active" id="step1">
            <h2>1. Data Demografi</h2>
            <div class="input-group">
                <label>Nama Pengguna</label>
                <input type="text" placeholder="Masukkan nama lengkap">
            </div>
            <div class="input-group">
                <label>Tanggal Lahir</label>
                <input type="date">
            </div>
            <div class="input-group">
                <label>Alamat</label>
                <textarea placeholder="Alamat lengkap"></textarea>
            </div>
            <div class="input-group">
                <label>No Telepon</label>
                <input type="tel" placeholder="08xxxx">
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="example@mail.com">
            </div>
            <div class="input-group">
                <label>Pendidikan (Dropdown)</label>
                <select>
                    <option value="">Pilih Pendidikan Terakhir</option>
                    <option>SMA/SMK</option>
                    <option>Diploma (D3)</option>
                    <option>Sarjana (S1)</option>
                    <option>Magister (S2)</option>
                    <option>Doktor (S3)</option>
                </select>
            </div>
            <div class="btn-group">
                <span></span>
                <button type="button" class="btn-next" onclick="nextStep(2)">Lanjut ke Data Bank</button>
            </div>
        </div>

        <div class="form-step" id="step2">
            <h2>2. Data Bank</h2>
            <div class="input-group">
                <label>Nama Bank</label>
                <select>
                    <option value="">Pilih Bank</option>
                    <option>Bank Mandiri</option>
                    <option>Bank BRI</option>
                    <option>Bank BCA</option>
                    <option>Bank BNI</option>
                    <option>Bank Kalsel</option>
                </select>
            </div>
            <div class="input-group">
                <label>Nomor Rekening</label>
                <input type="number" placeholder="Masukkan nomor rekening">
            </div>
            <div class="btn-group">
                <button type="button" class="btn-prev" onclick="nextStep(1)">Kembali</button>
                <button type="button" class="btn-next" onclick="nextStep(3)">Lanjut ke Transaksi</button>
            </div>
        </div>

        <div class="form-step" id="step3">
            <h2>3. Transaksi Keuangan</h2>
            <div class="input-group">
                <label>Tanggal Transaksi</label>
                <input type="date">
            </div>
            <div class="input-group">
                <label>Uraian Transaksi</label>
                <input type="text" placeholder="Contoh: Bayar Listrik">
            </div>
            <div class="input-group">
                <label>Jenis Transaksi</label>
                <div class="transaction-type">
                    <input type="radio" name="jenis" id="pemasukan" value="Pemasukan">
                    <label for="pemasukan">Pemasukan</label>
                    <input type="radio" name="jenis" id="pengeluaran" value="Pengeluaran">
                    <label for="pengeluaran">Pengeluaran</label>
                </div>
            </div>
            <div class="input-group">
                <label>Debet (Rp)</label>
                <input type="number" placeholder="0">
            </div>
            <div class="input-group">
                <label>Kredit (Rp)</label>
                <input type="number" placeholder="0">
            </div>
            <div class="btn-group">
                <button type="button" class="btn-prev" onclick="nextStep(2)">Kembali</button>
                <button type="submit" class="btn-next" style="background: #27ae60;">Simpan Data</button>
            </div>
        </div>

    </form>
</div>

<script>
    function nextStep(step) {
        // Sembunyikan semua langkah
        document.querySelectorAll('.form-step').forEach(s => s.classList.remove('active'));
        // Tampilkan langkah yang dituju
        document.getElementById('step' + step).classList.add('active');
    }

    document.getElementById('multiStepForm').onsubmit = function(e) {
        e.preventDefault();
        alert('Data berhasil disimpan!');
    };
</script>

</body>
</html>
