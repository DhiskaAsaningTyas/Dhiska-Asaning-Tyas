<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biodata Dhiska</title>
    <style>
        /* RESET DASAR */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* NAVBAR */
        nav {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover {
            color: #00f2fe;
        }

        /* CONTAINER UTAMA */
        .container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* CARD BIODATA */
        .card {
            background: white;
            padding: 35px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            animation: fadeIn 1s ease-out;
        }

        .card img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            margin-bottom: 20px;
            border: 5px solid #4facfe;
            object-fit: cover;
        }

        h1 {
            margin-bottom: 25px;
            color: #2c3e50;
            font-size: 26px;
            letter-spacing: 1px;
        }

        /* STRUKTUR BIODATA AGAR SEJAJAR */
        .info-group {
            text-align: left;
        }

        .info-item {
            display: flex; /* Membuat label dan isi bersampingan */
            margin-bottom: 12px;
            font-size: 15px;
            line-height: 1.5;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 8px;
        }

        .label {
            color: #4facfe;
            font-weight: bold;
            min-width: 90px; /* Menentukan lebar tetap untuk label */
            flex-shrink: 0; /* Mencegah label menyempit */
        }

        .value {
            color: #555;
            word-break: break-word; /* Mencegah teks keluar kotak */
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 15px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            font-size: 14px;
        }

        /* ANIMASI MASUK */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="biodata.html">Biodata</a>
        <a href="galeri.html">Galeri</a>
        <a href="video.html">Video</a>
    </nav>

            <h1>Profil Diri</h1>

            <div class="info-group">
                <div class="info-item">
                    <span class="label">Nama</span>
                    <span class="value">: Dhiska Asaning Tyas</span>
                </div>
                <div class="info-item">
                    <span class="label">NIM</span>
                    <span class="value">: 2310715120007</span>
                </div>
                <div class="info-item">
                    <span class="label">Jurusan</span>
                    <span class="value">: Sosial Ekonomi Perikanan</span>
                </div>
                <div class="info-item">
                    <span class="label">Umur</span>
                    <span class="value">: 20 Tahun</span>
                </div>
                <div class="info-item">
                    <span class="label">Alamat</span>
                    <span class="value">: Jl. Rambai Tengah, Banjarbaru</span>
                </div>
                <div class="info-item">
                    <span class="label">Hobi</span>
                    <span class="value">: Mendengarkan Musik</span>
                </div>
                <div class="info-item">
                    <span class="label">Email</span>
                    <span class="value">: tyasdhiskaasaning@gmail.com</span>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 Proyek Website Dhiska</p>
    </footer>

</body>
</html>
