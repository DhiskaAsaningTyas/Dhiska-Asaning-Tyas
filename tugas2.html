<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas 2 - Formulir Keuangan</title>
    <style>
        :root {
            --primary-color: #27ae60;
            --secondary-color: #2ecc71;
            --bg-color: #f0f2f5;
            --text-color: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            max-width: 700px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 30px;
        }

        fieldset {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
        }

        legend {
            font-weight: bold;
            padding: 0 10px;
            color: var(--primary-color);
            font-size: 1.1rem;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="number"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 1rem;
        }

        /* Styling Radio Button sebagai Button */
        .transaction-type {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }

        .transaction-type input[type="radio"] {
            display: none;
        }

        .transaction-type label {
            background: #eee;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
            flex: 1;
            text-align: center;
        }

        .transaction-type input[type="radio"]:checked + label {
            background: var(--primary-color);
            color: white;
        }

        button[type="submit"] {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1rem;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        button[type="submit"]:hover {
            background: var(--secondary-color);
        }

        nav { margin-bottom: 20px; }
        nav a { text-decoration: none; color: var(--primary-color); font-weight: bold; }
    </style>
</head>
<body>

    <nav><a href="../index.html">⬅ Kembali ke Portal Utama</a></nav>

    <div class="container">
        <h1>Formulir Data & Transaksi</h1>
        
        <form action="#" method="POST">
            
            <fieldset>
                <legend>Data Demografi</legend>
                <div class="form-group">
                    <label>Nama Pengguna</label>
                    <input type="text" name="nama" placeholder="Masukkan nama lengkap" required>
                </div>
                <div class="form-group">
                    <label>Tanggal Lahir</label>
                    <input type="date" name="tgl_lahir" required>
                </div>
                <div class="form-group">
                    <label>Alamat</label>
                    <textarea name="alamat" rows="2"></textarea>
                </div>
                <div class="form-group">
                    <label>No. Telepon</label>
                    <input type="tel" name="telp" placeholder="0812xxxx">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="contoh@mail.com">
                </div>
                <div class="form-group">
                    <label>Pendidikan Terakhir</label>
                    <select name="pendidikan">
                        <option value="">-- Pilih Pendidikan --</option>
                        <option value="SD">SD</option>
                        <option value="SMP">SMP</option>
                        <option value="SMA">SMA/SMK</option>
                        <option value="D3">Diploma (D3)</option>
                        <option value="S1">Sarjana (S1)</option>
                        <option value="S2">Magister (S2)</option>
                    </select>
                </div>
            </fieldset>

            <fieldset>
                <legend>Data Perbankan</legend>
                <div class="form-group">
                    <label>Nama Bank</label>
                    <input list="list-bank" name="nama_bank" placeholder="Cari atau pilih bank...">
                    <datalist id="list-bank">
                        <option value="Bank BCA">
                        <option value="Bank Mandiri">
                        <option value="Bank BNI">
                        <option value="Bank BRI">
                        <option value="Bank Syariah Indonesia (BSI)">
                    </datalist>
                </div>
                <div class="form-group">
                    <label>Nomor Rekening</label>
                    <input type="number" name="no_rek" placeholder="Masukkan nomor rekening">
                </div>
            </fieldset>

            <fieldset>
                <legend>Data Transaksi Keuangan</legend>
                <div class="form-group">
                    <label>Tanggal Transaksi</label>
                    <input type="date" name="tgl_transaksi" required>
                </div>
                <div class="form-group">
                    <label>Uraian Transaksi</label>
                    <input type="text" name="uraian" placeholder="Contoh: Bayar Listrik">
                </div>
                <div class="form-group">
                    <label>Jenis Transaksi</label>
                    <div class="transaction-type">
                        <input type="radio" name="jenis" id="pemasukan" value="pemasukan">
                        <label for="pemasukan">Pemasukan</label>
                        
                        <input type="radio" name="jenis" id="pengeluaran" value="pengeluaran">
                        <label for="pengeluaran">Pengeluaran</label>
                    </div>
                </div>
                <div class="form-group">
                    <label>Debet (Rp)</label>
                    <input type="number" name="debet" placeholder="0">
                </div>
                <div class="form-group">
                    <label>Kredit (Rp)</label>
                    <input type="number" name="kredit" placeholder="0">
                </div>
            </fieldset>

            <button type="submit">Simpan Data Transaksi</button>
        </form>
    </div>

</body>
</html>
