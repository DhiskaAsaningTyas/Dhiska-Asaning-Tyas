<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kumpulan Tugas Web Saya</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: #1a1a2e;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 800px;
            padding: 20px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #00d2ff;
        }

        p {
            margin-bottom: 40px;
            color: #adb5bd;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            display: block;
        }

        .card:hover {
            transform: translateY(-10px);
            background: #00d2ff;
            color: #1a1a2e;
            box-shadow: 0 10px 30px rgba(0, 210, 255, 0.4);
        }

        .card h2 {
            margin-bottom: 10px;
        }

        .status {
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            padding: 5px 10px;
            border-radius: 20px;
            background: rgba(0, 255, 0, 0.2);
            color: #00ff00;
        }

        .status.pending {
            background: rgba(255, 255, 255, 0.1);
            color: #888;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Portal Tugas Web</h1>
        <p>Selamat datang di repositori tugas mata kuliah desain web saya.</p>

        <div class="menu-grid">
            <a href="tugas1/index.html" class="card">
                <h2>Tugas 1</h2>
                <p>Website Biodata, Galeri, dan Video</p>
                <span class="status">Selesai</span>
            </a>

            <a href="tugas2/index.html" class="card">
                <h2>Tugas 2</h2>
                <p>Proyek baru akan datang di sini</p>
                <span class="status pending">Coming Soon</span>
            </a>
        </div>
    </div>

</body>
</html>
