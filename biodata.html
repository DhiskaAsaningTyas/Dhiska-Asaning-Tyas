<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biodata Dhiska Asaning Tyas</title>
    <style>
        /* 1. PENGATURAN DASAR */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 2. NAVBAR (NAVIGASI) */
        nav {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }

        nav a:hover {
            color: #00f2fe;
        }

        /* 3. CONTAINER TENGAH */
        .main-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 4. KARTU BIODATA */
        .card {
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            animation: muncul 1s ease-out;
        }

        /* Foto Profil */
        .card img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin-bottom: 20px;
            border: 4px solid #4facfe;
            object-fit: cover;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 25px;
            color: #2c3e50;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 10px;
        }

        /* 5. BAGIAN ISI BIODATA (AGAR RAPI & LURUS) */
        .info-wrapper {
            text-align: left;
        }

        .baris {
            display: flex; /* Membuat label dan isi sejajar */
            margin-bottom: 12px;
            font-size: 15px;
            line-height: 1.6;
        }

        .label {
            font-weight: bold;
            color: #4facfe;
            width: 80px; /* Lebar kolom label agar titik dua sejajar */
            flex-shrink: 0;
        }

        .isi {
            flex: 1;
            color: #555;
            word-break: break-word; /* Agar teks panjang tidak keluar kotak */
        }

        /* 6. FOOTER */
        footer {
            text-align: center;
            padding: 15px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            font-size: 14px;
        }

        /* Animasi Muncul */
        @keyframes muncul {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Home</a>
        <a href="biodata.html">Biodata</a>
        <a href="galeri.html">Galeri</a>
        <a href="video.html">Video</a>
    </nav>

    <div class="main-container">
        <div class="card">
            <img src="poto pp.jpeg" alt="Profil Dhiska">
            
            <h1>Biodata Saya</h1>

            <div class="info-wrapper">
                <div class="baris">
                    <div class="label">Nama</div>
                    <div class="isi">: Dhiska Asaning Tyas</div>
                </div>
                <div class="baris">
                    <div class="label">NIM</div>
                    <div class="isi">: 2310715120007</div>
                </div>
                <div class="baris">
                    <div class="label">Jurusan</div>
                    <div class="isi">: Sosial Ekonomi Perikanan</div>
                </div>
                <div class="baris">
                    <div class="label">Umur</div>
                    <div class="isi">: 20 Tahun</div>
                </div>
                <div class="baris">
                    <div class="label">Alamat</div>
                    <div class="isi">: Jl. Rambai Tengah, Banjarbaru</div>
                </div>
                <div class="baris">
                    <div class="label">Hobi</div>
                    <div class="isi">: Mendengarkan Musik</div>
                </div>
                <div class="baris">
                    <div class="label">Email</div>
                    <div class="isi">: tyasdhiskaasaning@gmail.com</div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 Website Biodata Dhiska</p>
    </footer>

</body>
</html>
