<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Input & Data</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .iframe-container {
            position: relative;
            width: 100%;
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 15px;
            margin-bottom: 30px;
        }
        /* Membuat iframe spreadsheet menjadi responsif */
        .responsive-iframe-wrapper {
            position: relative;
            overflow: hidden;
            width: 100%;
            padding-top: 56.25%; /* Aspect Ratio 16:9 */
        }
        .responsive-iframe-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="container my-5">
        <div class="text-center mb-5">
            <h1 class="fw-bold text-primary">Dashboard Sistem Informasi</h1>
            <p class="text-muted">Silakan isi formulir di bawah ini dan pantau hasilnya secara langsung pada tabel.</p>
        </div>

        <div class="row">
            <div class="col-lg-5">
                <div class="iframe-container">
                    <h3 class="h5 mb-3 fw-semibold border-bottom pb-2 text-secondary">Formulir Input</h3>
                    <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfM-3MdAWnNfsol9LXBN94_Kpal7eoX6zdGrsjXb7KOxwtWqA/viewform?embedded=true" 
                            width="100%" 
                            height="800" 
                            frameborder="0" 
                            marginheight="0" 
                            marginwidth="0">Memuat…</iframe>
                </div>
            </div>

            <div class="col-lg-7">
                <div class="iframe-container">
                    <h3 class="h5 mb-3 fw-semibold border-bottom pb-2 text-secondary">Data Spreadsheet</h3>
                    <div class="responsive-iframe-wrapper">
                        <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQy9L9t93cSEVC2MTdT4csYv-tOTsJMljHbx19ngZH1Jbw-9-0PgcgeLQa0G_-o7bv7eIwPDGV73RR7/pubhtml?widget=true&amp;headers=false"></iframe>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
