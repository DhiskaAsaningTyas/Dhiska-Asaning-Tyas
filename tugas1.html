<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas 1 - Menu Utama</title>
    <style>
        /* DASAR */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }

        h1 {
            margin-bottom: 40px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
            font-size: 2.5rem;
        }

        /* CONTAINER PILIHAN */
        .menu-wrapper {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }

        /* DESAIN KARTU PILIHAN */
        .menu-card {
            background: white;
            color: #333;
            width: 250px;
            padding: 40px 20px;
            border-radius: 20px;
            text-align: center;
            text-decoration: none;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            transition: all 0.4s ease;
            border: 2px solid transparent;
        }

        .menu-card:hover {
            transform: translateY(-15px);
            border-color: #4facfe;
            background: #f0faff;
        }

        .menu-card h2 {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: #4facfe;
        }

        .menu-card p {
            font-size: 0.9rem;
            color: #777;
        }

        /* FOOTER */
        footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.8rem;
            opacity: 0.8;
        }

        /* RESPONSIVE UNTUK HP */
        @media (max-width: 600px) {
            .menu-card {
                width: 90%;
            }
        }
    </style>
</head>
<body>

    <h1>Tugas 1</h1>

    <div class="menu-wrapper">
        <a href="biodata.html" class="menu-card">
            <h2>BIODATA</h2>
            <p>Informasi data diri lengkap</p>
        </a>

        <a href="galeri.html" class="menu-card">
            <h2>GALERI</h2>
            <p>Koleksi dokumentasi foto</p>
        </a>

        <a href="video.html" class="menu-card">
            <h2>VIDEO</h2>
            <p>Konten media visual</p>
        </a>
    </div>

    <footer>
        <p>© 2026 Dhiska Asaning Tyas - 2310715120007</p>
    </footer>

</body>
</html>
