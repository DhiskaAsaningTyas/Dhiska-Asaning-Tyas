<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Monitoring & Kepuasan - Sistem Terintegrasi</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        :root {
            --bg: #f4f7f6;
            --card: #ffffff;
            --primary: #1abc9c;
            --primary-dark: #16a085;
            --text: #2d3436;
            --muted: #636e72;
            --line: #e5e7eb;
            --shadow: 0 10px 30px rgba(0,0,0,.08);
            --radius: 18px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: 
                radial-gradient(circle at top left, rgba(26,188,156,.10), transparent 30%),
                radial-gradient(circle at right top, rgba(52,152,219,.09), transparent 26%),
                var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        /* Navbar Customization */
        .navbar-custom {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--line);
            box-shadow: var(--shadow);
            border-radius: 0 0 22px 22px;
        }

        .navbar-brand {
            color: var(--primary) !important;
        }

        /* Dashboard Card Customization */
        .dashboard-card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,.6);
            transition: transform .25s ease;
        }

        .dashboard-card:hover {
            transform: translateY(-2px);
        }

        .card-title-custom {
            font-size: 18px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 16px;
            border-bottom: 2px solid var(--line);
            padding-bottom: 10px;
        }

        /* Iframe Wrapper (Responsive) */
        .iframe-wrapper {
            position: relative;
            width: 100%;
            overflow: hidden;
            border-radius: 14px;
            border: 1px solid var(--line);
            background: #fff;
        }

        .ratio-spreadsheet {
            padding-top: 55%; /* Desktop spreadsheet aspect ratio */
            height: 0;
        }

        .ratio-spreadsheet iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        .ratio-datastudio {
            padding-top: 65%; /* Looker Studio aspect ratio */
            height: 0;
        }

        .ratio-datastudio iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        /* Navigation Pills (Tabs) Customization */
        .nav-pills-custom {
            background: #fff;
            padding: 8px;
            border-radius: 999px;
            box-shadow: var(--shadow);
            border: 1px solid var(--line);
            display: inline-flex;
        }

        .nav-pills-custom .nav-link {
            color: var(--muted);
            font-weight: 500;
            font-size: 14px;
            border-radius: 999px;
            padding: 10px 20px;
            border: none;
            background: transparent;
            transition: .25s ease;
        }

        .nav-pills-custom .nav-link:hover {
            color: var(--primary);
            background: rgba(26,188,156,.05);
        }

        .nav-pills-custom .nav-link.active {
            background-color: var(--primary) !important;
            color: #ffffff !important;
            box-shadow: 0 4px 14px rgba(26,188,156,.3);
        }

        /* Buttons Customization */
        .btn-custom-primary {
            background-color: var(--primary);
            color: #fff;
            border: none;
            border-radius: 14px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 500;
            transition: .25s ease;
            box-shadow: 0 4px 14px rgba(26,188,156,.2);
        }

        .btn-custom-primary:hover {
            background-color: var(--primary-dark);
            color: #fff;
            transform: translateY(-2px);
        }

        .btn-custom-danger {
            background-color: #e74c3c;
            color: #fff;
            border: none;
            border-radius: 14px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 500;
            transition: .25s ease;
            box-shadow: 0 4px 14px rgba(231,76,60,.2);
            text-decoration: none;
        }

        .btn-custom-danger:hover {
            background-color: #c0392b;
            color: #fff;
            transform: translateY(-2px);
        }

        .btn-custom-secondary {
            background-color: #34495e;
            color: #fff;
            border: none;
            border-radius: 14px;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 500;
            transition: .25s ease;
            box-shadow: 0 4px 14px rgba(52,73,94,.2);
            text-decoration: none;
        }

        .btn-custom-secondary:hover {
            background-color: #2c3e50;
            color: #fff;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-custom sticky-top py-3 mb-5">
        <div class="container d-flex justify-content-between align-items-center">
            <span class="navbar-brand mb-0 h1 fw-bold fs-4">
                <i class="bi bi-speedometer2 me-2"></i>Sistem Terintegrasi
            </span>
            <a href="https://faroukmuhamad-gif.github.io/DEMO-TUGAS/" class="btn-custom-danger d-flex align-items-center">
                <i class="bi bi-house-door-fill me-2"></i>Kembali ke Beranda
            </a>
        </div>
    </nav>

    <div class="container">
        
        <div class="row mb-5">
            <div class="col-12 text-center">
                <ul class="nav nav-pills nav-pills-custom justify-content-center" id="dashboardTab" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="utama-tab" data-bs-toggle="tab" data-bs-target="#utama" type="button" role="tab">
                            <i class="bi bi-file-earmark-text me-1"></i> Form Utama & Spreadsheet
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="kepuasan-tab" data-bs-toggle="tab" data-bs-target="#kepuasan" type="button" role="tab">
                            <i class="bi bi-heart-pulse me-1"></i> Form Kepuasan & Spreadsheet
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="studio-tab" data-bs-toggle="tab" data-bs-target="#studio" type="button" role="tab">
                            <i class="bi bi-bar-chart-line me-1"></i> Looker Data Studio
                        </button>
                    </li>
                </ul>
            </div>
        </div>

        <div class="tab-content" id="dashboardTabContent">
            
            <div class="tab-pane fade show active" id="utama" role="tabpanel">
                <div class="row g-4">
                    <div class="col-lg-5">
                        <div class="dashboard-card">
                            <h4 class="card-title-custom"><i class="bi bi-pencil-square me-2" style="color: var(--primary);"></i>Formulir Input Utama</h4>
                            <div class="iframe-wrapper">
                                <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSfM-3MdAWnNfsol9LXBN94_Kpal7eoX6zdGrsjXb7KOxwtWqA/viewform?embedded=true" width="100%" height="750" frameborder="0" marginheight="0" marginwidth="0">Memuat…</iframe>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-7">
                        <div class="dashboard-card">
                            <h4 class="card-title-custom"><i class="bi bi-table me-2" style="color: var(--primary);"></i>Data Spreadsheet Utama</h4>
                            <div class="iframe-wrapper ratio-spreadsheet">
                                <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vQy9L9t93cSEVC2MTdT4csYv-tOTsJMljHbx19ngZH1Jbw-9-0PgcgeLQa0G_-o7bv7eIwPDGV73RR7/pubhtml?widget=true&amp;headers=false"></iframe>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="kepuasan" role="tabpanel">
                <div class="row g-4">
                    <div class="col-lg-5">
                        <div class="dashboard-card">
                            <h4 class="card-title-custom"><i class="bi bi-emoji-smile me-2" style="color: var(--primary);"></i>Form Tingkat Kepuasan</h4>
                            <div class="iframe-wrapper">
                                <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSc0nOK4Y2crgeXXgfJDmdOKBQA1_QozPbcHR-GvvgoTYFIwFQ/viewform?embedded=true" width="100%" height="550" frameborder="0" marginheight="0" marginwidth="0">Memuat…</iframe>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-7">
                        <div class="dashboard-card">
                            <h4 class="card-title-custom"><i class="bi bi-table me-2" style="color: var(--primary);"></i>Data Spreadsheet Kepuasan</h4>
                            <div class="iframe-wrapper ratio-spreadsheet">
                                <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vTNpJtGRk0eL-jtKrESNhKV5W9kCVB0CPatKPEFSFvnHfFV2Jx7jWtsuzIPBcsw3GlBU4tf0ypkR6Eg/pubhtml?widget=true&amp;headers=false"></iframe>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="studio" role="tabpanel">
                <div class="row">
                    <div class="col-12">
                        <div class="dashboard-card">
                            <h4 class="card-title-custom"><i class="bi bi-pie-chart-fill me-2" style="color: var(--primary);"></i>Visualisasi Data Studio</h4>
                            <div class="iframe-wrapper ratio-datastudio">
                                <iframe src="https://datastudio.google.com/embed/reporting/04f15183-1a6f-4892-9ffe-5ea03bf8a43e/page/page_12345" frameborder="0" style="border:0" allowfullscreen></iframe>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <div class="text-center my-5">
            <a href="https://faroukmuhamad-gif.github.io/DEMO-TUGAS/" class="btn-custom-secondary d-inline-flex align-items-center">
                <i class="bi bi-arrow-left-circle me-2"></i>Kembali ke Halaman Beranda Utama
            </a>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
